name: Deploy to Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  DOCKER_REPOSITORY: kdhyun/docker-repo
  DK_NM: ${{ secrets.DK_NM }}
  DK_PW: ${{ secrets.DK_PW }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Login to Docker Hub
      run: |
        echo $DK_PW | docker login -u $DK_NM --password-stdin
    - name: Build, tag, and push image to Docker Hub
      id: build-image
      run: |
        GIT_HASH=$(git rev-parse --short "$GITHUB_SHA")
        docker build -t $DOCKER_REPOSITORY:$GIT_HASH .
        docker push $DOCKER_REPOSITORY:$GIT_HASH
        echo "::set-output name=image::$DOCKER_REPOSITORY:$GIT_HASH"
        
    - name: Repository checkout
      uses: actions/checkout@v2
      with:
        repository: kdguriguri/argocd-kube
        token: ${{ secrets.GIT_TK }}

    - name: Add date and push
      run: |
        GIT_HASH=$(git rev-parse --short "$GITHUB_SHA")
        sed -i "16s|.*|      - image: $DOCKER_REPOSITORY:$GIT_HASH|g" deployment.yaml
        git add .
        git config --global user.email "hyunhenry727@gmail.com"
        git config --global user.name "hyunhenry"
        git commit -am "Inject Tag"
        git push
